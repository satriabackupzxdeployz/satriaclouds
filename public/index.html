<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - SatriaClouds</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div style="color: #536471;">Memuat SatriaClouds...</div>
    </div>

    <div class="login-container" id="loginPage">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-cloud"></i></div>
            <h1>SatriaClouds</h1>
            <p class="login-subtitle">Simpan dan kelola file Anda dengan aman</p>
            <div id="googleSignInContainer"></div>
            <div class="login-features">
                <div class="feature-item"><i class="fas fa-lock"></i><span>Aman</span></div>
                <div class="feature-item"><i class="fas fa-bolt"></i><span>Cepat</span></div>
                <div class="feature-item"><i class="fas fa-infinity"></i><span>Unlimited</span></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast" style="display: none;"></div>
    <script src="/app.js"></script>
</body>
</html>
